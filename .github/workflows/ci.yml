name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref so PR pushes don't queue duplicates.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: pytest (py${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install with all test-relevant extras
        # `claude` pulls anthropic (for test_claude_backend), `server` pulls
        # fastapi/pydantic (for test_server + test_v2_server), `vault` covers
        # cryptography. `local`/`ann` are skipped — large wheels, exercised
        # in a dedicated job if needed.
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,claude,server,vault]"
      - name: Run pytest
        run: pytest -q

  lint:
    name: ruff + mypy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,claude,server,vault]"
      - name: ruff check
        run: ruff check .
      - name: mypy
        run: mypy
